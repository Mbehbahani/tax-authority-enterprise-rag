[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

markers =
    slow: long-running tests excluded from the fast loop (use pytest -m "not slow")
    redteam: RBAC adversarial tests (helpdesk → FIOD leak, prompt injection, cache poisoning)
    latency: pytest-benchmark percentile-budget tests (TTFT, retrieval, rerank, end-to-end)
    integration: requires real OpenSearch + Redis + Bedrock; provisioned by docker-runner
    citation: zero-hallucination citation grounding (lid + onderdeel depth)
    cache: semantic-cache key partitioning + cosine threshold near-miss
    temporal: tax-year correctness (2021/2022/2023/2024 ground-truth)
    refusal: ambiguity / structured_refusal / loop-guard fail-closed behaviour
    observability: OTel span emission + Module 4 promotion-gate metrics

filterwarnings =
    ignore::DeprecationWarning:botocore.*
    ignore::DeprecationWarning:opensearchpy.*

# Default to the fast loop. Full eval: `pytest` (drops -m filter).
addopts =
    -v
    --tb=short
    --strict-markers
    -m "not slow"
